# api — Backend REST API
server {
    listen 443 ssl;
    http2 on;
    server_name api.nbpdev.com api.nbpdev.es;

    ssl_certificate /etc/nginx/certs/live/api.nbpdev.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/api.nbpdev.com/privkey.pem;
    ssl_trusted_certificate /etc/nginx/certs/live/api.nbpdev.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50m;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /actuator {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }
}

