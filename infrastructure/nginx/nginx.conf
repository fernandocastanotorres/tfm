# Nginx Reverse Proxy — Single Entry Point for TFG Stack
# SSL termination with Let's Encrypt certificates

upstream frontend {
    server frontend:80;
}

upstream backoffice {
    server backoffice:80;
}

upstream backend {
    server backend:8080;
}

upstream grafana {
    server grafana:3000;
}

upstream prometheus {
    server prometheus:9090;
}

upstream loki {
    server loki:3100;
}

upstream mailpit {
    server mailpit:8025;
}

# Health check endpoint (no SSL required)
server {
    listen 80;
    server_name _;
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# HTTP — redirect all to HTTPS
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# sede — Citizen-facing portal
server {
    listen 443 ssl;
    http2 on;
    server_name sede.nbpdev.com;

    ssl_certificate /etc/nginx/certs/live/sede.nbpdev.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/sede.nbpdev.com/privkey.pem;
    ssl_trusted_certificate /etc/nginx/certs/live/sede.nbpdev.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

