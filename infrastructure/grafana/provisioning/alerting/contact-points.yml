apiVersion: 1

contactPoints:
  - orgId: 1
    name: tfm-observability-webhook
    receivers:
      - uid: tfm-observability-webhook
        type: webhook
        settings:
          url: ${GRAFANA_ALERT_WEBHOOK_URL}
          httpMethod: POST
          title: "[TFG] {{ .CommonLabels.alertname }}"
          message: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}"
        disableResolveMessage: false

  - orgId: 1
    name: tfm-observability-telegram
    receivers:
      - uid: tfm-observability-telegram
        type: telegram
        settings:
          bottoken: "${GRAFANA_TELEGRAM_BOT_TOKEN}"
          chatid: "609976"
          disable_notification: false
          disable_web_page_preview: true
          protect_content: false
          parse_mode: HTML
          message: "<b>[TFG]</b> {{ .CommonLabels.alertname }}\n{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}"
        disableResolveMessage: false
