server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: records-api
  messages:
    basename: i18n/procedure-catalog
    encoding: UTF-8
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/records_db}
    username: ${DB_USERNAME:records_user}
    password: ${DB_PASSWORD:records_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 3
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  task:
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 100
      thread-name-prefix: async-
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

flowable:
  database-schema-update: true
  check-process-definitions: true
  process-definition-location-prefix: classpath*:/processes/

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  issuer: records-api
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

# SpringDoc OpenAPI — Swagger UI for API documentation
springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_ENABLED:true}
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: es.tfm.records.entrypoints

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# Logging
logging:
  level:
    root: INFO
    es.tfm.records: DEBUG
    org.springframework.security: WARN

# CORS
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4300}

# File Storage
storage:
  documents-path: ${STORAGE_DOCUMENTS_PATH:./data/documents}

# JODConverter (LibreOffice) for PDF conversion before signing
jodconverter:
  enabled: ${JODCONVERTER_ENABLED:true}
  office-home: ${LIBREOFFICE_HOME:/usr/lib/libreoffice}
  port-numbers: ${LIBREOFFICE_PORT:2002}

# Electronic signature keystore
signing:
  keystore:
    password: ${SIGNING_KEYSTORE_PASSWORD:changeit}

mailing:
  enabled: ${MAILING_ENABLED:false}
  queue:
    enabled: ${MAILING_QUEUE_ENABLED:true}
  verification-base-url: ${MAILING_VERIFICATION_BASE_URL:http://localhost:4200/sede/verificar-email}
  password-reset-base-url: ${MAILING_PASSWORD_RESET_BASE_URL:http://localhost:4200/sede/restablecer-contrasena}
  from:
    email: ${MAILING_FROM_EMAIL:no-reply@records.local}
    name: ${MAILING_FROM_NAME:Records}
