server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: records-api
  messages:
    basename: i18n/procedure-catalog
    encoding: UTF-8
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/records_db}
    username: ${DB_USERNAME:records_user}
    password: ${DB_PASSWORD:records_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

flowable:
  database-schema-update: true
  check-process-definitions: true
  process-definition-location-prefix: classpath*:/processes/

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:change-me-to-a-secure-base64-secret-key-of-at-least-256-bits}
  issuer: records-api
  access-token-expiration: 900000       # 15 minutes in milliseconds
  refresh-token-expiration: 604800000   # 7 days in milliseconds

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: es.tfg.records.entrypoints

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Logging
logging:
  level:
    root: INFO
    es.tfg.records: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%X{correlationId}]){magenta} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"

# File Storage
storage:
  documents-path: ${STORAGE_DOCUMENTS_PATH:./data/documents}

mailing:
  enabled: ${MAILING_ENABLED:false}
  verification-base-url: ${MAILING_VERIFICATION_BASE_URL:http://localhost:4200/sede/verificar-email}
  from:
    email: ${MAILING_FROM_EMAIL:no-reply@records.local}
    name: ${MAILING_FROM_NAME:Records}
  brevo:
    api-key: ${BREVO_API_KEY:}
