server:
  servlet:
    context-path: /api/v1

spring:
  messages:
    basename: i18n/procedure-catalog
    encoding: UTF-8
  datasource:
    url: jdbc:h2:mem:records_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IHRoYXQgaXMgYXQgbGVhc3QgMzIgYnl0ZXM=
  issuer: tfg-records-test
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

storage:
  documents-path: ./data/test-documents

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

flowable:
  database-schema-update: true
  check-process-definitions: true
  process-definition-location-prefix: classpath*:/processes/
