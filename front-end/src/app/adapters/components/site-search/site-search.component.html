<main class="site-search" aria-labelledby="site-search-title">
  <div class="site-search__container">
    <header class="site-search__header">
      <h1 id="site-search-title">{{ 'SITE_SEARCH.TITLE' | translate }}</h1>
      <p class="site-search__subtitle">{{ 'SITE_SEARCH.SUBTITLE' | translate }}</p>
    </header>

    <div class="card p-6 mb-6">
      <label for="site-search-query" class="field-label">{{ 'SITE_SEARCH.SEARCH_LABEL' | translate }}</label>
      <input
        id="site-search-query"
        type="search"
        class="field-input mt-2"
        [(ngModel)]="query"
        [placeholder]="'SITE_SEARCH.SEARCH_PLACEHOLDER' | translate"
      />
    </div>

    <section class="space-y-3" aria-live="polite">
      <a *ngFor="let entry of filteredEntries" class="card p-5 block no-underline hover:shadow-xl transition" [routerLink]="[entry.route]">
        <p class="text-lg font-semibold text-surface-900">{{ entry.title | translate }}</p>
        <p class="text-sm text-surface-600 mt-1">{{ entry.description | translate }}</p>
        <p class="text-xs text-brand-600 mt-2">{{ entry.route }}</p>
      </a>
      <div *ngIf="filteredEntries.length === 0" class="card p-6 text-surface-600" role="status" aria-live="polite">
        {{ 'SITE_SEARCH.NO_RESULTS' | translate: { query: query } }}
      </div>
    </section>
  </div>
</main>
