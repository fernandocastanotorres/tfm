<main class="site-search" aria-labelledby="site-search-title">
  <section class="max-w-5xl mx-auto px-6 py-10">
    <header class="mb-6">
      <h1 id="site-search-title" class="text-2xl font-semibold text-surface-900">Buscador de sede</h1>
      <p class="text-surface-600 mt-1">Encuentra rapidamente servicios, tramites y contenidos publicos.</p>
    </header>

    <div class="card p-6 mb-6">
      <label for="site-search-query" class="field-label">Buscar</label>
      <input
        id="site-search-query"
        type="search"
        class="field-input mt-2"
        [(ngModel)]="query"
        placeholder="Ejemplo: transparencia, cita, normativa, CSV"
      />
    </div>

    <section class="space-y-3" aria-live="polite">
      <a *ngFor="let entry of filteredEntries" class="card p-5 block no-underline hover:shadow-xl transition" [routerLink]="[entry.route]">
        <p class="text-lg font-semibold text-surface-900">{{ entry.title }}</p>
        <p class="text-sm text-surface-600 mt-1">{{ entry.description }}</p>
        <p class="text-xs text-brand-600 mt-2">{{ entry.route }}</p>
      </a>
      <div *ngIf="filteredEntries.length === 0" class="card p-6 text-surface-600">
        No se encontraron resultados para "{{ query }}".
      </div>
    </section>
  </section>
</main>
