<section class="case-search" aria-labelledby="case-search-title">
  <div class="case-search__container">
    <header class="case-search__header">
      <h1 id="case-search-title" class="text-2xl font-semibold text-surface-900">{{ 'CASE_SEARCH.TITLE' | translate }}</h1>
      <p class="text-surface-600">{{ 'CASE_SEARCH.SUBTITLE' | translate }}</p>
    </header>

    <div class="mt-6" [formGroup]="searchForm">
      <label class="sr-only" for="case-search-input">{{ 'CASE_SEARCH.SEARCH_PLACEHOLDER' | translate }}</label>
      <input id="case-search-input" class="field-input w-full" formControlName="term" [placeholder]="'CASE_SEARCH.SEARCH_PLACEHOLDER' | translate" />
    </div>

    <app-skeleton-screen *ngIf="isLoading" pattern="list" [count]="5" ariaLabel="Buscando expedientes..." class="mt-6"></app-skeleton-screen>

    <div class="mt-6 space-y-4" *ngIf="!isLoading">
      <a
        *ngFor="let item of filteredCases; trackBy: trackByIndex"
        class="card p-5 block no-underline hover:shadow-xl transition"
        [routerLink]="['/sede/expedientes', item.id, 'detalle']"
      >
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h2 class="text-lg font-semibold text-surface-900">{{ item.title }}</h2>
            <p class="text-surface-600 mt-1">{{ item.id }}</p>
            <p class="text-surface-600 mt-1" *ngIf="item.recordNumber">{{ item.recordNumber }}</p>
            <p class="text-surface-600 mt-1">{{ item.procedureType }}</p>
          </div>
          <span class="text-xs font-semibold px-3 py-1 rounded-full bg-surface-100 text-surface-600">{{ 'CASE_STATUS.' + toCaseStatusKey(item.status) | translate }}</span>
        </div>
      </a>

      <div *ngIf="filteredCases.length === 0" class="card p-6 text-surface-600">{{ 'CASE_SEARCH.NO_RESULTS' | translate }}</div>
    </div>
  </div>
</section>
