<div class="grid gap-4 md:grid-cols-2" role="status" aria-live="polite" aria-label="Cargando contenido">
  <article class="card p-5 animate-pulse" *ngFor="let _ of cardSlots; trackBy: trackByIndex">
    <div class="h-4 w-1/3 rounded bg-surface-200"></div>
    <div class="mt-4 space-y-3">
      <div class="h-3 rounded bg-surface-100" *ngFor="let __ of lineSlots; trackBy: trackByIndex"></div>
    </div>
    <div class="mt-5 h-9 w-32 rounded bg-surface-200"></div>
  </article>
</div>
