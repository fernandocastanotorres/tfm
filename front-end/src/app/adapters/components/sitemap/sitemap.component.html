<section class="sitemap" aria-labelledby="sitemap-title">
  <div class="sitemap__container">
    <header class="sitemap__header">
      <nav aria-label="Breadcrumb" class="sitemap__breadcrumb">
        <a [routerLink]="['/sede']">{{ 'PUBLIC.NAV_HOME' | translate }}</a>
        <span aria-hidden="true">/</span>
        <span aria-current="page">{{ 'SITEMAP.EYEBROW' | translate }}</span>
      </nav>
      <h1 id="sitemap-title">{{ 'SITEMAP.TITLE' | translate }}</h1>
      <p class="sitemap__subtitle">{{ 'SITEMAP.SUBTITLE' | translate }}</p>
    </header>

    <div class="sitemap__grid">
      <div class="sitemap__section" *ngFor="let section of sections">
        <h2 class="sitemap__section-title">{{ section.titleKey | translate }}</h2>
        <ul class="sitemap__links">
          <li *ngFor="let link of section.links">
            <a [routerLink]="link.route" class="sitemap__link">{{ link.labelKey | translate }}</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</section>
