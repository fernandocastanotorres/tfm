<section class="auth-page" aria-labelledby="verify-title">
  <div class="card w-full max-w-2xl p-10 text-center space-y-4">
    <h1 id="verify-title" class="text-2xl font-semibold text-surface-900">{{ 'EMAIL_VERIFICATION.TITLE' | translate }}</h1>
    <p *ngIf="isLoading" class="text-surface-600">{{ 'EMAIL_VERIFICATION.LOADING' | translate }}</p>
    <p *ngIf="!isLoading && success" class="text-success font-semibold">{{ 'EMAIL_VERIFICATION.SUCCESS' | translate }}</p>
    <p *ngIf="!isLoading && !success" class="error-text">{{ 'EMAIL_VERIFICATION.ERROR' | translate }}</p>
    <a routerLink="/sede/login" class="btn-primary inline-block" *ngIf="!isLoading">{{ 'EMAIL_VERIFICATION.GO_LOGIN' | translate }}</a>
  </div>
</section>
