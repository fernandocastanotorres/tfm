<main class="app-shell">
  <header class="px-6 py-4 bg-white border-b border-surface-100 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-sm font-semibold text-brand-600">TFG</span>
      <span class="text-sm text-surface-600">{{ 'APP.TAGLINE' | translate }}</span>
    </div>
    <label class="sr-only" for="locale-select">Idioma</label>
    <select
      id="locale-select"
      class="field-input w-44"
      [value]="currentLocale"
      (change)="switchLocale($any($event.target).value)"
      aria-label="Selecciona idioma"
    >
      <option *ngFor="let locale of locales" [value]="locale.code">
        {{ locale.label }}
      </option>
    </select>
  </header>
  <router-outlet></router-outlet>
</main>
