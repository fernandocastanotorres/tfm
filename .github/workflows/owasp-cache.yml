name: Update OWASP NVD Cache

on:
  schedule:
    - cron: '0 4 * * *'  # daily at 4am UTC
  workflow_dispatch:

jobs:
  update-nvd-cache:
    name: Update NVD Cache
    runs-on: ubuntu-latest
    environment: arsys
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Restore NVD cache
        id: cache
        uses: actions/cache@v4
        with:
          path: .owasp-nvd-cache
          key: owasp-nvd-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            owasp-nvd-

      - name: Update OWASP NVD database
        working-directory: backend
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -Dformat=HTML \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -DdataDirectory=${{ github.workspace }}/.owasp-nvd-cache
