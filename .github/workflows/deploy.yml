name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: arsys
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: SERVER_HOST,SERVER_USER,CERT_PASSWORD
          script: |
            set -e

            APP_DIR="/opt/tfm"
            BACKUP_DIR="/opt/tfm-backup-$(date +%Y%m%d%H%M%S)"

            echo "=== Stopping current deployment ==="
            if [ -d "$APP_DIR" ]; then
              cp -r "$APP_DIR" "$BACKUP_DIR"
              docker compose --project-name tfm -f "$APP_DIR/docker-compose.yml" down --remove-orphans 2>/dev/null || true
              docker rm -f $(docker ps -aq --filter "name=tfm-" 2>/dev/null) 2>/dev/null || true
              docker network rm tfm_tfm-network 2>/dev/null || true
            fi

            echo "=== Pulling latest code ==="
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            else
              cd "$APP_DIR"
              git pull origin main
            fi

            echo "=== Extracting SSL certificates ==="
            cd "$APP_DIR"
            bash infrastructure/nginx/extract-certs.sh

            echo "=== Building Docker images ==="
            docker builder prune -f 2>/dev/null || true
            docker compose --project-name tfm -f docker-compose.yml build --no-cache --pull

            echo "=== Pulling base images ==="
            docker compose --project-name tfm -f docker-compose.yml pull

            echo "=== Starting services ==="
            docker compose --project-name tfm -f docker-compose.yml up -d

            echo "=== Cleaning old images ==="
            docker image prune -f

            echo "=== Deployment complete ==="
            docker compose ps

            if [ -d "$BACKUP_DIR" ]; then
              echo "Backup saved at: $BACKUP_DIR"
            fi
