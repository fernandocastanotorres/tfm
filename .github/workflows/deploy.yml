name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: arsys
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: SERVER_HOST,SERVER_USER
          script: |
            set -e

            APP_DIR="/opt/tfm"
            BACKUP_DIR="/opt/tfm-backup-$(date +%Y%m%d%H%M%S)"

            echo "=== Stopping current deployment ==="
            if [ -d "$APP_DIR" ]; then
              cp -r "$APP_DIR" "$BACKUP_DIR"
              docker compose -f "$APP_DIR/docker-compose.yml" down || true
            fi

            echo "=== Pulling latest code ==="
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            else
              cd "$APP_DIR"
              git pull origin main
            fi

            echo "=== Building Docker images ==="
            cd "$APP_DIR"
            docker compose build --pull

            echo "=== Pulling base images ==="
            docker compose pull

            echo "=== Starting services ==="
            docker compose up -d

            echo "=== Cleaning old images ==="
            docker image prune -f

            echo "=== Deployment complete ==="
            docker compose ps

            if [ -d "$BACKUP_DIR" ]; then
              echo "Backup saved at: $BACKUP_DIR"
            fi

  certbot:
    runs-on: ubuntu-latest
    environment: arsys
    needs: deploy
    steps:
      - name: Generate/renew Let's Encrypt certificates
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            APP_DIR="/opt/tfm"
            cd "$APP_DIR"

            DOMAINS=(
              "api.nbpdev.es"
              "grafana.nbpdev.es"
              "prometheus.nbpdev.es"
              "loki.nbpdev.es"
              "mail.nbpdev.es"
            )

            for domain in "${DOMAINS[@]}"; do
              echo "=== Certbot for $domain ==="
              docker run --rm \
                -v "$(pwd)/infrastructure/nginx/certs:/etc/letsencrypt" \
                -v "$(pwd)/infrastructure/nginx/www:/var/www/letsencrypt" \
                certbot/certbot certonly --webroot \
                --webroot-path /var/www/letsencrypt \
                --domain "$domain" \
                --email admin@nbpdev.es \
                --agree-tos --non-interactive --expand --keep-until-expiring \
                || echo "Certificate for $domain already exists or failed, skipping"
            done

            echo "=== Reloading nginx ==="
            docker exec tfm-nginx nginx -s reload || true
