<section class="mx-auto max-w-3xl px-4 py-16" role="alert" aria-live="assertive" aria-labelledby="error-title">
  <div class="rounded-xl border border-slate-200 bg-white p-8 text-center shadow-sm md:p-12">
    <p class="text-sm font-semibold tracking-wide text-sky-700">Error {{ variant }}</p>
    <h1 id="error-title" class="mt-3 text-2xl font-bold text-slate-900">{{ title }}</h1>
    <p class="mt-4 text-sm text-slate-600 md:text-base">{{ description }}</p>

    <div class="mt-8 flex flex-col items-center justify-center gap-3 sm:flex-row">
      <button type="button" class="rounded-md bg-sky-600 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-700" (click)="goDashboard()">
        {{ 'BO.ERROR.GO_DASHBOARD' | translate }}
      </button>
      <button type="button" class="rounded-md border border-slate-300 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50" (click)="goBack()">
        {{ 'BO.ERROR.GO_BACK' | translate }}
      </button>
    </div>
  </div>
</section>
