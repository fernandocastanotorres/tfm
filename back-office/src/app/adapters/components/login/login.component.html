<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow-md p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">{{ 'BO.LOGIN.TITLE' | translate }}</h1>
        <p class="text-sm text-gray-500 mt-1">{{ 'BO.LOGIN.SUBTITLE' | translate }}</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
            {{ 'BO.LOGIN.EMAIL_LABEL' | translate }}
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            [placeholder]="'BO.LOGIN.EMAIL_PLACEHOLDER' | translate"
            autocomplete="email"
            aria-describedby="email-error-bo"
            [attr.aria-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          />
          <p id="email-error-bo" class="text-sm text-red-600 mt-1" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            {{ 'BO.LOGIN.EMAIL_ERROR' | translate }}
          </p>
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            {{ 'BO.LOGIN.PASSWORD_LABEL' | translate }}
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            [placeholder]="'BO.LOGIN.PASSWORD_PLACEHOLDER' | translate"
            autocomplete="current-password"
            aria-describedby="password-error-bo"
            [attr.aria-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          <p id="password-error-bo" class="text-sm text-red-600 mt-1" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            {{ 'BO.LOGIN.PASSWORD_ERROR' | translate }}
          </p>
        </div>

        <div *ngIf="error" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-md text-sm" role="alert">
          {{ error }}
        </div>

        <button
          type="submit"
          [disabled]="isLoading || loginForm.invalid"
          class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
          <span *ngIf="!isLoading">{{ 'BO.LOGIN.SUBMIT' | translate }}</span>
          <span *ngIf="isLoading">{{ 'BO.LOGIN.LOADING' | translate }}</span>
        </button>
      </form>
    </div>
  </div>
</div>
