x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  loki:
    image: grafana/loki:3.0.0
    container_name: tfg-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks:
      - tfg-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: tfg-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infrastructure/promtail/config.yml:/etc/promtail/config.yml:ro
    networks:
      - tfg-network
    depends_on:
      loki:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: tfg-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GRAFANA_ALERT_WEBHOOK_URL: ${GRAFANA_ALERT_WEBHOOK_URL:-http://host.docker.internal:19093/alerts}
      GRAFANA_TELEGRAM_BOT_TOKEN: ${GRAFANA_TELEGRAM_BOT_TOKEN:-}
      GRAFANA_TELEGRAM_CHAT_ID: ${GRAFANA_TELEGRAM_CHAT_ID:-}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - tfg-network
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped

  postgres:
    image: postgres:16.2-alpine
    container_name: tfg-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-records_db}
      POSTGRES_USER: ${POSTGRES_USER:-records_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    labels:
      observability.environment: ${OBS_ENVIRONMENT:-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tfg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-records_user} -d ${POSTGRES_DB:-records_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tfg-backend
    logging: *default-logging
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-records_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-records_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      FLOWABLE_ASYNC_EXECUTOR_ACTIVATE: ${FLOWABLE_ASYNC_EXECUTOR_ACTIVATE:-true}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE:-health,info,metrics}
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:-when_authorized}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:4300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAILING_ENABLED: ${MAILING_ENABLED:-true}
      MAILING_QUEUE_ENABLED: ${MAILING_QUEUE_ENABLED:-false}
      MAILING_FROM_EMAIL: ${MAILING_FROM_EMAIL:-no-reply@records.local}
      MAILING_FROM_NAME: ${MAILING_FROM_NAME:-Records}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      MAILING_VERIFICATION_BASE_URL: ${MAILING_VERIFICATION_BASE_URL:-http://localhost:4200/sede/verificar-email}
      MAILING_PASSWORD_RESET_BASE_URL: ${MAILING_PASSWORD_RESET_BASE_URL:-http://localhost:4200/sede/restablecer-contrasena}
      SIGNING_KEYSTORE_PASSWORD: ${SIGNING_KEYSTORE_PASSWORD:-changeit}
      STORAGE_DOCUMENTS_PATH: ${STORAGE_DOCUMENTS_PATH:-/app/data/documents}
    labels:
      observability.environment: ${OBS_ENVIRONMENT:-dev}
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data/documents:/app/data/documents
    networks:
      - tfg-network
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: tfg-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    labels:
      observability.environment: ${OBS_ENVIRONMENT:-dev}
    networks:
      - tfg-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./front-end/Dockerfile
    container_name: tfg-frontend
    ports:
      - "4200:80"
      - "4201:443"
    labels:
      observability.environment: ${OBS_ENVIRONMENT:-dev}
    networks:
      - tfg-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  backoffice:
    build:
      context: .
      dockerfile: ./back-office/Dockerfile
    container_name: tfg-backoffice
    ports:
      - "4300:80"
      - "4301:443"
    labels:
      observability.environment: ${OBS_ENVIRONMENT:-dev}
    networks:
      - tfg-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

networks:
  tfg-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  loki-data:
    driver: local
  grafana-data:
    driver: local
